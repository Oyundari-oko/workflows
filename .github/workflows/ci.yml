name: 01 - Bun Code Lint
on: [push]
jobs:
  lint-job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install 

      - name: Run Linter
        run: bun run lint

  build:
    needs: lint-client
    name: Code build
    runs-on: ubuntu-latest

    steps:
     uses: actions/checkout@v4
     uses: oven-sh/setup-bun@v2
     run: bun install
     run: bun run build 